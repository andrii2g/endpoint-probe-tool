name: ci

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x
      - name: Restore
        run: dotnet restore --configfile NuGet.Config
      - name: Build
        run: dotnet build --no-restore
      - name: Test
        run: dotnet test --no-build --verbosity normal
      - name: Pack local tool
        run: dotnet pack src/EndpointProbe.Tool/EndpointProbe.Tool.csproj -c Release --no-build -o ./nupkg
      - name: Install packed tool locally
        run: dotnet tool install EndpointProbe.Tool --tool-path ./.tools --add-source ./nupkg
      - name: Smoke test installed tool
        run: ./.tools/endpoint-probe --help
